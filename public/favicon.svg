<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#c2410c"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0.5" dy="0.75" stdDeviation="0.6" flood-color="rgba(0,0,0,0.45)"/>
    </filter>
  </defs>

  <rect width="32" height="32" rx="5" fill="url(#bg)"/>

  <text
    x="16" y="24"
    font-family="Impact, 'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-size="24"
    font-weight="900"
    font-style="italic"
    fill="white"
    stroke="white"
    stroke-width="1.2"
    stroke-linejoin="round"
    text-anchor="middle"
    filter="url(#shadow)"
  >W</text>
</svg>
